name: Suggest a tool
description: Recommend a browser-based tool for the ToolHub collection.
title: "Tool suggestion: "
labels:
  - tool-suggestion
body:
  - type: input
    id: name
    attributes:
      label: Tool name
      placeholder: e.g. PairDrop
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Tool URL
      placeholder: https://example.com/
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: What job does it do well?
      description: Please explain the tool in one or two sentences.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Best-fit collection
      options:
        - Share & transfer
        - Convert & resize
        - Images
        - Documents & PDF
        - Developer desk
        - Create & explain
        - A new collection
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Quick checks
      options:
        - label: The tool works in a modern browser.
          required: true
        - label: I have no undisclosed affiliation with this tool.
          required: true
